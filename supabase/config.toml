# Локальная конфигурация Supabase CLI (supabase link использует project_id).
# Project ref: ppehttbtrlavnrytoweu

project_id = "ppehttbtrlavnrytoweu"

[functions.register-send-code]
verify_jwt = false

[functions.register-verify]
verify_jwt = false

[functions.fix-db]
enabled = true
verify_jwt = false
import_map = "./functions/fix-db/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/fix-db/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/fix-db/*.html" ]
