name: Static Checks

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML entrypoint exists
        run: test -f index.html

      - name: Validate JavaScript syntax
        run: |
          node --check assets/js/config.example.js
          node --check assets/js/integrations.js
          node --check assets/js/data.js
          node --check assets/js/app.js
          if [ -f assets/js/config.js ]; then node --check assets/js/config.js; fi
